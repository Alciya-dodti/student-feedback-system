<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Feedback System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-inner">
      <div class="logo">📋 FeedbackHub</div>
      <p class="tagline">Share your learning experience</p>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main>

    <!-- LEFT PANEL: Feedback Form -->
    <section class="form-panel">
      <h2 class="section-title">Submit Feedback</h2>

      <!-- Toast Notification (hidden by default) -->
      <div id="toast" class="toast hidden"></div>

      <!-- THE FORM -->
      <div class="form-group">
        <label for="studentName">Student Name</label>
        <input
          type="text"
          id="studentName"
          placeholder="e.g. Rahul Sharma"
        />
      </div>

      <div class="form-group">
        <label for="courseName">Course Name</label>
        <input
          type="text"
          id="courseName"
          placeholder="e.g. Web Development"
        />
      </div>

      <div class="form-group">
        <label>Rating</label>
        <!-- Star Rating UI -->
        <div class="star-rating" id="starRating">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <span id="ratingLabel" class="rating-label">Click to rate</span>
        <!-- Hidden input to store selected rating -->
        <input type="hidden" id="rating" value="0" />
      </div>

      <div class="form-group">
        <label for="comments">Comments</label>
        <textarea
          id="comments"
          placeholder="Share your thoughts about the course..."
          rows="4"
        ></textarea>
      </div>

      <button id="submitBtn" onclick="submitFeedback()">
        Submit Feedback
      </button>
    </section>

    <!-- RIGHT PANEL: Feedback List -->
    <section class="list-panel">
      <div class="list-header">
        <h2 class="section-title">All Feedback</h2>
        <span id="feedbackCount" class="count-badge">0 entries</span>
      </div>

      <!-- Loading state -->
      <div id="loadingState" class="empty-state">
        <div class="spinner"></div>
        <p>Loading feedback...</p>
      </div>

      <!-- Empty state (shown when no feedback) -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📭</div>
        <p>No feedback yet. Be the first to submit!</p>
      </div>

      <!-- Feedback cards will be injected here by JavaScript -->
      <div id="feedbackList"></div>
    </section>

  </main>

  <!-- Link JavaScript file -->
  <script src="app.js"></script>

</body>
</html>
